#1MB = 1024k = 0x100000 
#64k = 0x10000
#512 = 0x200
#1M - 64k = 960k = 0xf0000
#1MB - 64k - 512 = 0xefe00 = set to 0xdfe00 to make a gap for dynamic partitions
#MR25R64 is 64Mb, or 8MB.  = 0x800000
#0x800000 - 0xf0000 = 0x710000

