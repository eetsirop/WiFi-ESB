# WI-FI ONLY CONFIG
#These configurations are  needed for Wi-Fi 
CONFIG_WIFI=y
CONFIG_WIFI_NRF700X=y

# TWT
CONFIG_TWT_INTERVAL=5000000
CONFIG_TWT_WAKE_INTERVAL=100000
CONFIG_TWT_ANNOUNCED_MODE=y

# New for 2.5.0 SDK
CONFIG_NET_CONFIG_INIT_TIMEOUT=0
CONFIG_NET_SOCKETS_POLL_MAX=10
CONFIG_POSIX_MAX_FDS=16

CONFIG_HELIOGEN_SSID_24GHZ="G5-Heliostat-AP_4"
CONFIG_HELIOGEN_SSID_5GHZ="G5-Heliostat-AP-5GHz_4"
CONFIG_HELIOGEN_PASSWORD="mphGQ9s7G9pz"
CONFIG_HELOGEN_WIFI_BOOT_DELAY=15

#TODO: USE ZEPHYR-NORDIC WIFI CREDENTIALS MANAGER
#CONFIG_WIFI_CREDENTIALS=y
#CONFIG_WIFI_CREDENTIALS_SHELL=y
#CONFIG_SETTINGS=y
#CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
#CONFIG_SETTINGS_NVS=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=n
CONFIG_NET_LOG=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_DHCPV4=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_CONNECT_TIMEOUT=10000
CONFIG_NET_DHCPV4_INITIAL_DELAY_MAX=10
#optional statistics
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_WIFI=y
CONFIG_NET_STATISTICS_USER_API=y

# WPA supplicant
CONFIG_WPA_SUPP=y
CONFIG_NET_L2_WIFI_SHELL=y
# Wi-Fi logging
CONFIG_WIFI_LOG_LEVEL_DBG=n #highly verbose - not recommended
CONFIG_NET_L2_WIFI_MGMT_LOG_LEVEL_ERR=y
CONFIG_NET_IF_LOG_LEVEL_ERR=y
CONFIG_NET_DHCPV4_LOG_LEVEL_ERR=y

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32

# Below section is the primary contributor to SRAM and is currently
# tuned for performance, but this will be revisited in the future.
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_TC_TX_COUNT=1

CONFIG_NET_MAX_CONTEXTS=5
CONFIG_NET_CONTEXT_SYNC_RECV=y

CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_SHELL=y

#this section sets a static ip, but is overriden by DHCP
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="10.0.0.228"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="10.0.0.1"

#ipv6 settings - disabled to reduce flash memory footprint
#CONFIG_NET_IPV6=n
#CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=4
#CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=5
#CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
#CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::2"

CONFIG_NET_TX_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=4096
#CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048  #this causes crash
#CONFIG_NET_MGMT_EVENT_STACK_SIZE must be big or stack will overflow
CONFIG_NET_MGMT_EVENT_STACK_SIZE=8192 

#some wi-fi configs from 2.3.0 wi-fi shell sample app  TODO: investigate
#CONFIG_NET_CONFIG_AUTO_INIT=n  ???
