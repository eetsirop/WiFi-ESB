CONFIG_MQTT_TOPIC_STRING_MAX_SIZE=64
CONFIG_MQTT_PAYLOAD_STRING_MAX_SIZE=2548
CONFIG_MQTT_TRANSPORT_RECONNECTION_TIMEOUT_SECONDS=30
