# In order to provide board specific configurations to the MCUboot child image
# we also need to provide a base configuration for MCUboot. This file contains
# the basic configurations needed to successfully build and run MCUboot.

# MCUboot requires a large stack size, otherwise an MPU fault will occur
CONFIG_MAIN_STACK_SIZE=10240

CONFIG_DEBUG_OPTIMIZATIONS=n

# Enable flash operations
CONFIG_FLASH=y

# This must be increased to accommodate the bigger images.
CONFIG_BOOT_MAX_IMG_SECTORS=256

#SPI nor flash - needs multithreading
CONFIG_MULTITHREADING=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

# Enable serial recovery
#CONFIG_UART_CONSOLE=n
#CONFIG_MCUBOOT_SERIAL=n
#CONFIG_MCUBOOT_SERIAL_DIRECT_IMAGE_UPLOAD=n
#CONFIG_BOOT_SERIAL_DETECT_PIN=0

# # Enable simultaneous multi-image DFU (image 0 = APP, image 1 = NET)
# CONFIG_UPDATEABLE_IMAGE_NUMBER=2

# CONFIG_LOG=y
# CONFIG_USE_SEGGER_RTT=y
# CONFIG_LOG_BACKEND_RTT=y
# CONFIG_RTT_CONSOLE=y

# Multi-image support: image 0 (app) + image 1 (netcore)
# CONFIG_UPDATEABLE_IMAGE_NUMBER=2

# Required for nRF53 hook-based decisions / netcore handling:
# CONFIG_BOOT_IMAGE_ACCESS_HOOKS=y

# Enable PCD support in MCUboot so it can transfer/program netcore image:
