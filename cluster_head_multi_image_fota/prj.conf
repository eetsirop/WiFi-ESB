############### IPC CONFIGS ###############
CONFIG_BOARD_ENABLE_CPUNET=y
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
CONFIG_MBOX=y
CONFIG_MBOX_NRFX_IPC=y
############### IPC CONFIGS ###############

############### NET CORE CHILD IMAGE ###############
# CONFIG_NCS_SAMPLE_EMPTY_NET_CORE_CHILD_IMAGE=n
# CONFIG_PARTITION_MANAGER_ENABLED=y
# Enable multi-image update support (MCUboot image0 + network-core image1)
# Needed to generate the CPUNET B0N container partitions/macros used by PCD
CONFIG_NRF53_UPGRADE_NETWORK_CORE=y
# CONFIG_UPDATEABLE_IMAGE_NUMBER=2
CONFIG_PCD=y
CONFIG_PCD_APP=y
# CONFIG_PCD_NET_CORE_APP_OFFSET=0x8800
############### NET CORE CHILD IMAGE ###############

# Anomaly 160 workaround
CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_NET_CONFIG_LOG_LEVEL_ERR=y

# LDO mode for wireless node
CONFIG_BOARD_ENABLE_DCDC_APP=y
CONFIG_BOARD_ENABLE_DCDC_NET=y
CONFIG_BOARD_ENABLE_DCDC_HV=y

# new SDK 2.5.0
CONFIG_NET_SOCKETS=y
CONFIG_WPA_SUPP=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=0
CONFIG_NET_SOCKETS_POLL_MAX=10
CONFIG_POSIX_MAX_FDS=16

# System settings
CONFIG_INIT_STACKS=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n
CONFIG_REBOOT=y

# Memories
CONFIG_HEAP_MEM_POOL_SIZE=160000
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_STACK_USAGE=y


# Sadman's edit
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=1024
CONFIG_SHELL_BACKEND_SERIAL_TX_RING_BUFFER_SIZE=1024


# Kernel options
CONFIG_ENTROPY_GENERATOR=y
CONFIG_BUILTIN_STACK_GUARD=y

# Enabling assert
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
CONFIG_ASSERT_LEVEL=2
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_ASSERT_NO_MSG_INFO=n

#RTT
CONFIG_USE_SEGGER_RTT=y
#this enables shell on RTT - already enabled on serial
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_DOWN=256

#shell config
CONFIG_SHELL=y
CONFIG_POSIX_CLOCK=y
#enables reboot (cold or warm) via shell
# CONFIG_REBOOT=y

#future options
#CONFIG_SERIAL=y
#CONFIG_UART_CONSOLE=y
# CONFIG_CONSOLE=y
# CONFIG_RTT_CONSOLE=y
#CONFIG_LOG_BACKEND_NET=y  - log over udp unecrypted
#CONFIG_LOG_BACKEND_NET_SERVER="1.2.3.4":10514"  - server ip

#UDP logging
CONFIG_LOG_BACKEND_NET=n
#CONFIG_LOG_BACKEND_NET_SERVER="10.0.0.200:514"
#CONFIG_LOG_BACKEND_NET_AUTOSTART=n

#can also log to a file system....


# Configuration required by Application Event Manager
CONFIG_APP_EVENT_MANAGER=y

#TODO use DFU firmware info
#CONFIG_FW_INFO=y
#CONFIG_FW_INFO_MAGIC_FIRMWARE_INFO=
#CONFIG_FW_INFO_FIRMWARE_VERSION=1.0.1

# Low level configs
CONFIG_NRFX_SAADC=y
CONFIG_NRFX_TIMER0=y
CONFIG_NRFX_TIMER1=y
CONFIG_NRFX_TIMER2=y
CONFIG_NRFX_DPPI=y

# Sadman's edit
# CONFIG_NRFX_GPIOTE0=y
CONFIG_NRFX_GPIOTE=y

CONFIG_PWM=y

# comment back in if using the PDK
#CONFIG_NRF700X_REV_A=y

#CONFIG_STDOUT_CONSOLE=y
CONFIG_CBPRINTF_FP_SUPPORT=y

#Quad SPI bus
CONFIG_NRFX_QSPI=y #7002 wi-fi chip is on QSPI


#SPI
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_SPI_ASYNC=y

#SPI Flash
CONFIG_FLASH=y  #this seems to be needed for spi flash macros and ordinals
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

## Enable the LittleFS file system. - needs mcuboot to be flashed on chip!
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_PM_PARTITION_REGION_LITTLEFS_EXTERNAL=y


#JSON
CONFIG_JSON_LIBRARY=y

# Zephyr state framework
CONFIG_SMF=y

# IRQ settings - TODO - understand these
#CONFIG_MULTI_LEVEL_INTERRUPTS=y
#CONFIG_2ND_LEVEL_INTERRUPTS=y
#CONFIG_3RD_LEVEL_INTERRUPTS=y
#The support for zero-latency interrupts requires 
#CONFIG_ZERO_LATENCY_IRQS=y
#to be enabled. In addition to that, the flag IRQ_ZERO_LATENCY 
#must be passed to IRQ_CONNECT or IRQ_DIRECT_CONNECT macros to 
#configure the particular interrupt with zero latency.


#Heliogen config sytem file setup
CONFIG_HELIOGEN_CONFIG_FILE_CONFIG="cfg_file.txt"
CONFIG_HELIOGEN_CONFIG_FILE_DEFAULT="cfg.json"


#######################################################################
