CONFIG_NRF_CLOUD_LOG_LEVEL_OFF=y
CONFIG_APP_EVENT_MANAGER_SHELL=n
CONFIG_APP_EVENT_MANAGER_LOG_LEVEL_OFF=y
CONFIG_MGMT_FMFU_LOG_LEVEL_OFF=y
CONFIG_ZTEST_MULTICORE_DEFAULT_SETTINGS=n
CONFIG_APP_EVENT_MANAGER_SHOW_EVENTS=n
CONFIG_APP_EVENT_MANAGER_LOG_EVENT_TYPE=n
CONFIG_MPSL_LOG_LEVEL_OFF=y
CONFIG_KERNEL_LOG_LEVEL_OFF=y
CONFIG_INTC_LOG_LEVEL_OFF=y
CONFIG_USBC_LOG_LEVEL_OFF=y
